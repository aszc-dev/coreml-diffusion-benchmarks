[project]
name = "coreml-diffusion-benchmarks"
version = "0.1.0"
description = "Stable Diffusion 1.5 UNet cross-backend benchmark harness"
readme = "README.md"
requires-python = ">=3.12,<3.13"
dependencies = [
  "click==8.1.8",
  "coremltools==8.3.0",
  "diffusers==0.32.2",
  "numpy==2.1.3",
  "psutil==6.1.1",
  "pydantic==2.10.6",
  "pyyaml==6.0.2",
  "rich==13.9.4",
  "safetensors==0.5.3",
  "torch==2.6.0",
  "transformers==4.49.0",
  "typer==0.15.1",
]

[dependency-groups]
dev = [
  "pytest==8.3.4",
]

[project.scripts]
sdbench = "sdbench.cli:app"

[build-system]
requires = ["hatchling==1.27.0"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sdbench"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
